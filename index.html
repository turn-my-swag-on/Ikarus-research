<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css"> <!-- Link to external CSS for styling -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <!-- Chart.js for interactive charts -->
    <title>Ikarus Research Dashboard</title>
</head>
<body>
    <header>
        <h1>Ikarus Research Dashboard</h1>
        <div>
            <button id="theme-toggle">Toggle Dark/Light Theme</button>
        </div>
    </header>
    <main>
        <section id="analysis">
            <h2>Company Analysis</h2>
            <!-- Charts for semiconductor companies will be rendered here -->
            <canvas id="semiconductorChart"></canvas>
        </section>
        <section id="moat-scoring">
            <h2>Moat Scoring</h2>
            <div id="moat-results">
                <!-- Moat scoring results will be displayed here -->
            </div>
        </section>
        <section id="scenario-analysis">
            <h2>Scenario Analysis</h2>
            <div id="scenario-results">
                <!-- Scenario analysis results will be displayed here -->
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Ikarus Research</p>
    </footer>
    <script>
        // JavaScript for handling theme toggle and rendering charts
        document.getElementById('theme-toggle').addEventListener('click', function() {
            document.body.classList.toggle('dark-theme');
        });
        // Logic for rendering charts using Chart.js will go here
    </script>
</body>
</html>
